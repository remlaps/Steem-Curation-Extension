name: Update Chart.js

on:
  schedule:
    # Run every Monday at 2 AM UTC (weekly check)
    - cron: '0 2 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Extract current Chart.js version
        id: current-version
        run: |
          CURRENT_VERSION=$(grep -oP 'Chart\.js v\K[0-9]+\.[0-9]+\.[0-9]+' libs/chart.min.js | head -1)
          if [ -z "$CURRENT_VERSION" ]; then
            # Fallback: try to extract from the comment line
            CURRENT_VERSION=$(grep -oP '/npm/chart\.js@\K[0-9]+\.[0-9]+\.[0-9]+' libs/chart.min.js | head -1)
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current Chart.js version: $CURRENT_VERSION"

      - name: Get latest Chart.js version from npm
        id: latest-version
        run: |
          LATEST_VERSION=$(curl -s https://registry.npmjs.org/chart.js | jq -r '.["dist-tags"].latest')
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest Chart.js version: $LATEST_VERSION"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current-version.outputs.current_version }}"
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "is_newer=false" >> $GITHUB_OUTPUT
            echo "Versions match. No update needed."
            exit 0
          fi
          
          # Simple semver comparison using sort -V (version sort)
          # If latest sorts after current, it's newer
          if printf '%s\n%s\n' "$CURRENT" "$LATEST" | sort -V | head -1 | grep -q "^$CURRENT$"; then
            echo "is_newer=true" >> $GITHUB_OUTPUT
            echo "New version available: $LATEST (current: $CURRENT)"
          else
            echo "is_newer=false" >> $GITHUB_OUTPUT
            echo "Current version is newer or equal. No update needed."
          fi

      - name: Check for existing PR
        id: check-pr
        if: steps.compare.outputs.is_newer == 'true'
        run: |
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          BRANCH_NAME="update/chartjs-$LATEST"
          
          # Check if branch already exists
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "Branch $BRANCH_NAME already exists. Skipping update."
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "No existing PR found. Proceeding with update."
          fi

      - name: Download latest Chart.js
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          CURRENT="${{ steps.current-version.outputs.current_version }}"
          
          echo "Downloading Chart.js v$LATEST..."
          
          # Download the new version to a temp file
          curl -L "https://cdn.jsdelivr.net/npm/chart.js@$LATEST/dist/chart.umd.js" -o libs/chart.min.js.tmp
          
          # Verify download succeeded
          if [ ! -s libs/chart.min.js.tmp ]; then
            echo "Error: Download failed or file is empty"
            exit 1
          fi
          
          # Create the file with the proper header format matching the original
          {
            echo "/**"
            echo " * Skipped minification because the original files appears to be already minified."
            echo " * Original file: /npm/chart.js@$LATEST/dist/chart.umd.js"
            echo " *"
            echo " * Do NOT use SRI with dynamically generated files! More information: https://www.jsdelivr.com/using-sri-with-dynamic-files"
            echo " */"
            echo "/*!"
            echo " * Chart.js v$LATEST"
            echo " * https://www.chartjs.org"
            echo " * (c) 2025 Chart.js Contributors"
            echo " * Released under the MIT License"
            echo " */"
          } > libs/chart.min.js
          
          # Append the downloaded content (skip any existing header comments)
          # The downloaded file might start with /*! or other comments, so we'll take everything
          cat libs/chart.min.js.tmp >> libs/chart.min.js
          rm libs/chart.min.js.tmp
          
          echo "Chart.js updated to v$LATEST"
          echo "File size: $(wc -c < libs/chart.min.js) bytes"

      - name: Verify file was updated
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          if grep -q "chart.js@$LATEST" libs/chart.min.js; then
            echo "✓ File header updated correctly"
          else
            echo "✗ Warning: File header may not have been updated correctly"
          fi
          
          if [ -s libs/chart.min.js ]; then
            echo "✓ File exists and is not empty"
          else
            echo "✗ Error: File is missing or empty"
            exit 1
          fi

      - name: Configure git and verify changes
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Verify git sees the changes (don't stage - let the action handle it)
          echo "Checking git status..."
          git status --short libs/chart.min.js || echo "File status checked"
          
          # Verify the file was actually modified
          if git diff --quiet libs/chart.min.js; then
            echo "⚠ Warning: Git reports no changes to libs/chart.min.js"
            echo "File size: $(wc -c < libs/chart.min.js) bytes"
            echo "First 100 chars: $(head -c 100 libs/chart.min.js)"
            echo "This might cause the PR creation to fail."
            exit 1
          else
            echo "✓ Git detects changes in libs/chart.min.js"
            git diff --stat libs/chart.min.js | head -5
          fi

      - name: Create branch, commit, and push
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          CURRENT="${{ steps.current-version.outputs.current_version }}"
          BRANCH_NAME="update/chartjs-$LATEST"
          
          # Create and checkout new branch
          git checkout -b "$BRANCH_NAME"
          
          # Stage the changed file
          git add libs/chart.min.js
          
          # Verify something is staged
          if git diff --cached --quiet; then
            echo "Error: No changes staged. Aborting."
            exit 1
          fi
          
          # Commit the changes
          git commit -m "chore: Update Chart.js to v$LATEST"
          
          # Push the branch
          git push origin "$BRANCH_NAME"
          
          echo "Branch $BRANCH_NAME created and pushed successfully"

      - name: Create Pull Request using GitHub API
        id: create-pr
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          CURRENT="${{ steps.current-version.outputs.current_version }}"
          BRANCH_NAME="update/chartjs-$LATEST"
          
          # Get repository owner and name from GITHUB_REPOSITORY
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          
          # Create PR body
          PR_BODY=$(cat <<EOF
          ## Automated Chart.js Update
          
          This PR was automatically created by the [Update Chart.js](.github/workflows/update-chartjs.yml) workflow.
          
          ### Version Information
          - **Previous version:** $CURRENT
          - **New version:** $LATEST
          
          ### Changes
          - Updated \`libs/chart.min.js\` to the latest version from [jsdelivr CDN](https://cdn.jsdelivr.net/npm/chart.js@$LATEST/dist/chart.umd.js)
          
          ### Verification
          Please verify that the extension still works correctly with this Chart.js version before merging.
          
          ### Related Links
          - [Chart.js Releases](https://github.com/chartjs/Chart.js/releases)
          - [Chart.js Changelog](https://github.com/chartjs/Chart.js/blob/master/CHANGELOG.md)
          EOF
          )
          
          # Create PR using GitHub REST API
          PR_RESPONSE=$(curl -s -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "{
              \"title\": \"chore: Update Chart.js to v$LATEST\",
              \"head\": \"$BRANCH_NAME\",
              \"base\": \"main\",
              \"body\": $(echo "$PR_BODY" | jq -Rs .)
            }")
          
          # Extract PR number and URL from response
          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number // empty')
          PR_URL=$(echo "$PR_RESPONSE" | jq -r '.html_url // empty')
          
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "Error creating PR. Response: $PR_RESPONSE"
            exit 1
          fi
          
          echo "pull-request-number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pull-request-url=$PR_URL" >> $GITHUB_OUTPUT
          
          echo "✓ Pull request created: $PR_URL"
          
          # Try to add labels if they exist (using API)
          for label in "dependencies" "automated"; do
            # Check if label exists
            if curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/labels/$label" | jq -e '.name' > /dev/null 2>&1; then
              # Add label to PR
              curl -s -X POST \
                -H "Accept: application/vnd.github.v3+json" \
                -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/labels" \
                -d "{\"labels\":[\"$label\"]}" > /dev/null || true
            fi
          done
          
      - name: PR result
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          echo "PR number: ${{ steps.create-pr.outputs.pull-request-number }}"
          echo "PR url:    ${{ steps.create-pr.outputs.pull-request-url }}" 