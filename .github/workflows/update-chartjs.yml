name: Update Chart.js

on:
  schedule:
    # Run every Monday at 2 AM UTC (weekly check)
    - cron: '0 2 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract current Chart.js version
        id: current-version
        run: |
          CURRENT_VERSION=$(grep -oP 'Chart\.js v\K[0-9]+\.[0-9]+\.[0-9]+' libs/chart.min.js | head -1)
          if [ -z "$CURRENT_VERSION" ]; then
            # Fallback: try to extract from the comment line
            CURRENT_VERSION=$(grep -oP '/npm/chart\.js@\K[0-9]+\.[0-9]+\.[0-9]+' libs/chart.min.js | head -1)
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current Chart.js version: $CURRENT_VERSION"

      - name: Get latest Chart.js version from npm
        id: latest-version
        run: |
          LATEST_VERSION=$(curl -s https://registry.npmjs.org/chart.js | jq -r '.["dist-tags"].latest')
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest Chart.js version: $LATEST_VERSION"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current-version.outputs.current_version }}"
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "is_newer=false" >> $GITHUB_OUTPUT
            echo "Versions match. No update needed."
            exit 0
          fi
          
          # Simple semver comparison using sort -V (version sort)
          # If latest sorts after current, it's newer
          if printf '%s\n%s\n' "$CURRENT" "$LATEST" | sort -V | head -1 | grep -q "^$CURRENT$"; then
            echo "is_newer=true" >> $GITHUB_OUTPUT
            echo "New version available: $LATEST (current: $CURRENT)"
          else
            echo "is_newer=false" >> $GITHUB_OUTPUT
            echo "Current version is newer or equal. No update needed."
          fi

      - name: Check for existing PR
        id: check-pr
        if: steps.compare.outputs.is_newer == 'true'
        run: |
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          BRANCH_NAME="update/chartjs-$LATEST"
          
          # Check if branch already exists
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "Branch $BRANCH_NAME already exists. Skipping update."
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "No existing PR found. Proceeding with update."
          fi

      - name: Download latest Chart.js
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          CURRENT="${{ steps.current-version.outputs.current_version }}"
          
          echo "Downloading Chart.js v$LATEST..."
          
          # Download the new version to a temp file
          curl -L "https://cdn.jsdelivr.net/npm/chart.js@$LATEST/dist/chart.umd.js" -o libs/chart.min.js.tmp
          
          # Verify download succeeded
          if [ ! -s libs/chart.min.js.tmp ]; then
            echo "Error: Download failed or file is empty"
            exit 1
          fi
          
          # Create the file with the proper header format matching the original
          cat > libs/chart.min.js << 'HEADER_EOF'
/**
 * Skipped minification because the original files appears to be already minified.
 * Original file: /npm/chart.js@
HEADER_EOF
          echo "$LATEST/dist/chart.umd.js" >> libs/chart.min.js
          cat >> libs/chart.min.js << 'HEADER_EOF'
 *
 * Do NOT use SRI with dynamically generated files! More information: https://www.jsdelivr.com/using-sri-with-dynamic-files
 */
/*!
 * Chart.js v
HEADER_EOF
          echo "$LATEST" >> libs/chart.min.js
          cat >> libs/chart.min.js << 'HEADER_EOF'
 * https://www.chartjs.org
 * (c) 2025 Chart.js Contributors
 * Released under the MIT License
 */
HEADER_EOF
          
          # Append the downloaded content (skip any existing header comments)
          # The downloaded file might start with /*! or other comments, so we'll take everything
          cat libs/chart.min.js.tmp >> libs/chart.min.js
          rm libs/chart.min.js.tmp
          
          echo "Chart.js updated to v$LATEST"
          echo "File size: $(wc -c < libs/chart.min.js) bytes"

      - name: Verify file was updated
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          LATEST="${{ steps.latest-version.outputs.latest_version }}"
          if grep -q "chart.js@$LATEST" libs/chart.min.js; then
            echo "✓ File header updated correctly"
          else
            echo "✗ Warning: File header may not have been updated correctly"
          fi
          
          if [ -s libs/chart.min.js ]; then
            echo "✓ File exists and is not empty"
          else
            echo "✗ Error: File is missing or empty"
            exit 1
          fi

      - name: Create Pull Request
        if: steps.compare.outputs.is_newer == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/chartjs-${{ steps.latest-version.outputs.latest_version }}
          base: main
          title: 'chore: Update Chart.js to v${{ steps.latest-version.outputs.latest_version }}'
          body: |
            ## Automated Chart.js Update
            
            This PR was automatically created by the [Update Chart.js](.github/workflows/update-chartjs.yml) workflow.
            
            ### Version Information
            - **Previous version:** ${{ steps.current-version.outputs.current_version }}
            - **New version:** ${{ steps.latest-version.outputs.latest_version }}
            
            ### Changes
            - Updated `libs/chart.min.js` to the latest version from [jsdelivr CDN](https://cdn.jsdelivr.net/npm/chart.js@${{ steps.latest-version.outputs.latest_version }}/dist/chart.umd.js)
            
            ### Verification
            Please verify that the extension still works correctly with this Chart.js version before merging.
            
            ### Related Links
            - [Chart.js Releases](https://github.com/chartjs/Chart.js/releases)
            - [Chart.js Changelog](https://github.com/chartjs/Chart.js/blob/master/CHANGELOG.md)
          commit-message: 'chore: Update Chart.js to v${{ steps.latest-version.outputs.latest_version }}'
          labels: |
            dependencies
            automated
